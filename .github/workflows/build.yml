name: Build Space Shooter 3D

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.2.2
  EXPORT_NAME: SpaceShooter
  PROJECT_PATH: .
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # BUILD WINDOWS .EXE
  # ─────────────────────────────────────────────
  build-windows:
    name: 🖥️ Windows EXE Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Godot ${{ env.GODOT_VERSION }}
        uses: chickensoft-games/setup-godot@v1
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Verify Godot installation
        run: godot --version

      - name: Import project (generate .godot cache)
        run: |
          cd ${{ env.PROJECT_PATH }}
          godot --headless --import || true

      - name: Export Windows build
        run: |
          mkdir -p builds/windows
          cd ${{ env.PROJECT_PATH }}
          godot --headless --export-release "Windows Desktop" \
            "\( GITHUB_WORKSPACE/builds/windows/ \){{ env.EXPORT_NAME }}.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-Windows
          path: builds/windows/
          retention-days: 30

  # ─────────────────────────────────────────────
  # BUILD ANDROID .APK
  # ─────────────────────────────────────────────
  build-android:
    name: 📱 Android APK Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          # cache отключён (убрали строку полностью)

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" \
            "platform-tools" "cmdline-tools;latest"

      - name: Setup Godot ${{ env.GODOT_VERSION }}
        uses: chickensoft-games/setup-godot@v1
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Configure Godot Android export
        run: |
          mkdir -p \~/.config/godot
          cat > \~/.config/godot/editor_settings-4.tres << 'EOF'
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          export/android/debug_keystore = "/home/runner/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/force_system_user = false
          export/android/timestamping_authority_url = ""
          export/android/shutdown_adb_on_exit = true
          EOF

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -keystore \~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" || true

      - name: Import project
        run: |
          cd ${{ env.PROJECT_PATH }}
          godot --headless --import || true

      - name: Export Android APK
        run: |
          mkdir -p builds/android
          cd ${{ env.PROJECT_PATH }}
          godot --headless --export-debug "Android" \
            "\( GITHUB_WORKSPACE/builds/android/ \){{ env.EXPORT_NAME }}.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-Android
          path: builds/android/
          retention-days: 30

  # ─────────────────────────────────────────────
  # RELEASE (only on version tags)
  # ─────────────────────────────────────────────
  release:
    name: 🚀 Create Release
    needs: [ build-windows, build-android ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-Windows
          path: release/windows

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-Android
          path: release/android

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/windows/${{ env.EXPORT_NAME }}.exe
            release/android/${{ env.EXPORT_NAME }}.apk
          body: |
            ## 🚀 Space Shooter 3D — ${{ github.ref_name }}
            
            ### Downloads
            - 🖥️ **Windows**: `SpaceShooter.exe` — run directly, no install needed
            - 📱 **Android**: `SpaceShooter.apk` — enable "Unknown sources" to install
            
            ### Controls (PC)
            - **WASD** — move ship
            - **Space** / **LMB** — shoot
            - **Esc** — pause
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
