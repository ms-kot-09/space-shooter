<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect width="128" height="128" fill="#000010"/>
  <!-- Stars -->
  <circle cx="20" cy="15" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="50" cy="8"  r="1"   fill="white" opacity="0.6"/>
  <circle cx="90" cy="20" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="110" cy="10" r="1"  fill="white" opacity="0.7"/>
  <circle cx="15" cy="40"  r="1"  fill="white" opacity="0.5"/>
  <circle cx="105" cy="50" r="1.5" fill="white" opacity="0.8"/>
  <!-- Ship body -->
  <polygon points="64,20 80,90 64,75 48,90" fill="#2288FF"/>
  <!-- Wings -->
  <polygon points="48,90 20,100 40,60" fill="#1155CC"/>
  <polygon points="80,90 108,100 88,60" fill="#1155CC"/>
  <!-- Engine glow -->
  <ellipse cx="64" cy="92" rx="10" ry="5" fill="#00CCFF" opacity="0.9"/>
  <ellipse cx="64" cy="92" rx="6" ry="3"  fill="white"  opacity="0.8"/>
  <!-- Cockpit -->
  <ellipse cx="64" cy="45" rx="8" ry="10" fill="#88DDFF" opacity="0.7"/>
  <!-- Gun tips -->
  <rect x="58" y="15" width="3" height="10" fill="#00FFCC" rx="1"/>
  <rect x="67" y="15" width="3" height="10" fill="#00FFCC" rx="1"/>
</svg>
